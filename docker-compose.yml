services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/yaobezyana
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-in-production-min-32-chars
      JWT_EXPIRATION: 86400000
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yaobezyana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yaobezyana"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: on-failure
    # После первого запуска выполни: docker exec <container_id> ollama pull llama3.2:3b
    # Модель кэшируется в volume ollama_data — повторно скачивать не нужно

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@yaobezyana.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: on-failure

volumes:
  postgres_data:
  pgadmin_data:
  ollama_data:
