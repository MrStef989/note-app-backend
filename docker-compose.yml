services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/yaobezyana
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-in-production-min-32-chars
      JWT_EXPIRATION: 86400000
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yaobezyana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yaobezyana"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
